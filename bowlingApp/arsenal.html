<!DOCTYPE html>
<html>

<head>
    <title>Arsenal Management</title>
</head>

<body>
    <h1>Arsenal Management</h1>
    <p>Bowler: <b id="userEmail"></b></p>
    <hr>

    <h3>Add New Equipment</h3>
    <form id="ballForm">
        <label>Ball Name:</label>
        <input type="text" id="ballName" placeholder="e.g. Phaze II"><br><br>

        <label>Weight:</label>
        <input type="text" id="ballWeight" placeholder="e.g. 15lb"><br><br>

        <label>Layout/Notes:</label>
        <input type="text" id="ballNotes" placeholder="e.g. 4x4x2"><br><br>

        <button type="button" onclick="addBall()">Add to Arsenal</button>
    </form>

    <hr>
    <h3>Arsenal Inventory</h3>
    <table border="1" id="arsenalTable">
        <thead>
            <tr>
                <th>Ball Name</th>
                <th>Weight</th>
                <th>Notes</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Storm IQ Tour</td>
                <td>15lb</td>
                <td>Solid - Benchmark</td>
            </tr>
        </tbody>
    </table>

    <script>
        const email = new URLSearchParams(window.location.search).get('email');
        document.getElementById('userEmail').innerText = email;

        function addBall() {
            const table = document.getElementById('arsenalTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow();
            row.insertCell(0).innerText = document.getElementById('ballName').value;
            row.insertCell(1).innerText = document.getElementById('ballWeight').value;
            row.insertCell(2).innerText = document.getElementById('ballNotes').value;

            document.getElementById('ballForm').reset();
        }
    </script>
</body>

</html>
